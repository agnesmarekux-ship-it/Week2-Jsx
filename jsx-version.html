<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans — JSX version</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        // Components can be used INSIDE other components — this is called "composition"
        // This Button component is small, but it keeps button styling/logic in one place
        // "variant" defaults to "secondary" if not provided — this is called a default parameter
        function Button({ label, variant = "secondary" }) {
            return (
                // Template literal (``) lets us build a className string with the variant value
                <button className={`download-button ${variant}`}>{label}</button>
            );
        }

        // Same card UI as index.html: .card-top wraps title, price row, and feature block; CTA sits below.
        // priceAmount + pricePeriod mirror <span class="card-price-amount"> and <span class="card-price-period">.
        function PricingCard({ title, priceAmount, pricePeriod, includesText, features, buttonText, buttonVariant }) {
            return (
                <div className="card">
                    <div className="card-top">
                        <h3 className="card-title">{title}</h3>
                        <p className="card-price">
                            <span className="card-price-amount">{priceAmount}</span>
                            {pricePeriod != null && pricePeriod !== '' && (
                                <span className="card-price-period">{pricePeriod}</span>
                            )}
                        </p>
                        <div className="card-content">
                            <p className="includes-text">{includesText}</p>
                            <ul className="features-list">
                                {features.map((feature, i) => (
                                    <li key={i}>
                                        <span className="checkmark">✓</span>
                                        {feature}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                    <Button label={buttonText} variant={buttonVariant} />
                </div>
            );
        }

        function App() {
            // In JSX, we separate DATA from PRESENTATION
            // These objects hold all the content for each pricing card
            // #region agent log
            fetch('http://127.0.0.1:7607/ingest/3ce4afd4-b967-47ab-9d15-6f038f0e3aa7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'882e92'},body:JSON.stringify({sessionId:'882e92',runId:'run1',hypothesisId:'H1',location:'jsx-version.html:56',message:'App render started on JSX page',data:{path:window.location.pathname,title:document.title},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
            const hobbyPlan = {
                title: 'Hobby',
                priceAmount: 'Free',
                pricePeriod: null,
                includesText: 'Includes:',
                features: ['No credit card required', 'Limited Agent requests', 'Limited Tab completions'],
                buttonText: 'Download',
                buttonVariant: 'secondary',
            };
            const proPlan = {
                title: 'Pro',
                priceAmount: '$20',
                pricePeriod: '/mo.',
                includesText: 'Everything in Hobby, plus:',
                features: [
                    'Extended limits on Agent',
                    'Unlimited Tab completions',
                    'Background Agents',
                    'Maximum context windows',
                ],
                buttonText: 'Get Pro',
                buttonVariant: 'secondary',
            };
            const enterprisePlan = {
                title: 'Enterprise',
                priceAmount: 'Custom',
                pricePeriod: null,
                includesText: 'Everything in Pro, plus:',
                features: [
                    'SSO and SCIM provisioning',
                    'Org-wide usage and admin controls',
                    'Priority support and onboarding',
                    'Invoice billing and custom terms',
                ],
                buttonText: 'Contact sales',
                buttonVariant: 'secondary',
            };
            // #region agent log
            fetch('http://127.0.0.1:7607/ingest/3ce4afd4-b967-47ab-9d15-6f038f0e3aa7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'882e92'},body:JSON.stringify({sessionId:'882e92',runId:'run1',hypothesisId:'H2',location:'jsx-version.html:85',message:'Plans defined and intended cards computed',data:{plansDefined:[hobbyPlan.title,proPlan.title,enterprisePlan.title],cardsRenderedByJSX:2},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
            return (
                // <> is a React Fragment - it groups elements without adding extra HTML divs
                <>
                    <p className="page-label"><strong>JSX version</strong> — same UI, built with components</p>
                    <div className="cards-container">
                        {/* The spread operator {...hobbyPlan} passes all object properties as individual props */}
                        {/* Same as writing: title="Hobby" priceAmount="Free" pricePeriod={null} ... */}
                        <PricingCard {...hobbyPlan} />
                        <PricingCard {...proPlan} />
                        <PricingCard {...enterprisePlan} />
                    </div>
                </>
            );
        }

        // This tells React to render our App component into the <div id="root"> element
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // #region agent log
        requestAnimationFrame(() => {
            fetch('http://127.0.0.1:7607/ingest/3ce4afd4-b967-47ab-9d15-6f038f0e3aa7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'882e92'},body:JSON.stringify({sessionId:'882e92',runId:'run1',hypothesisId:'H3',location:'jsx-version.html:103',message:'Rendered card count on screen',data:{domCardCount:document.querySelectorAll('.card').length,cardTitles:Array.from(document.querySelectorAll('.card-title')).map((el)=>el.textContent)},timestamp:Date.now()})}).catch(()=>{});
        });
        // #endregion
    </script>
</body>
</html>
